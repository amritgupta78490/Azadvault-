<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallpaper Preview - Azad Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --theme-maroon: #8B0000; 
            --theme-maroon-dark: #4A0000;
            --bg-dark: #1e2029;
            --device-border: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { 
            background-color: var(--bg-dark); 
            color: white; 
            overflow-x: hidden; 
        }

        /* --- HEADER --- */
        .page-header { 
            padding: 20px 5%; 
            display: flex; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 101; 
            background-color: var(--bg-dark);
        }
        
        .btn-back { 
            background: rgba(255,255,255,0.1); 
            color: white; 
            border: 1px solid rgba(255,255,255,0.2); 
            padding: 10px 20px; 
            border-radius: 50px; 
            cursor: pointer; 
            margin-right: 20px; 
            font-size: 14px;
            font-weight: 500; 
            transition: 0.3s; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        
        .btn-back:hover { background: rgba(255,255,255,0.2); transform: translateX(-3px); }

        #dynamic-preview-title { font-weight: 500; font-size: 18px; }

        .container { padding: 0 5%; max-width: 1000px; margin: 0 auto; }
        
        .preview-wrapper { 
            margin: 20px auto 50px; 
            background: rgba(255, 255, 255, 0.03); 
            padding: 60px 20px; 
            border-radius: 30px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* --- LAPTOP FRAME (DESKTOP) --- */
        .device-frame {
            position: relative;
            width: 100%;
            max-width: 700px; 
            aspect-ratio: 16 / 10;
            background: #000;
            border: 14px solid var(--device-border);
            border-radius: 20px 20px 5px 5px;
            margin: 0 auto 60px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            z-index: 5;
        }

        /* Laptop Webcam */
        .device-frame::before {
            content: '';
            position: absolute;
            top: -9px; left: 50%;
            transform: translateX(-50%);
            width: 6px; height: 6px;
            background: #222; border-radius: 50%;
            z-index: 10;
        }

        /* Laptop Bottom Base (Refined) */
        .device-frame::after {
            content: '';
            position: absolute;
            bottom: -28px; left: -10%;
            width: 120%; height: 14px;
            background: linear-gradient(to bottom, #444, #111);
            border-radius: 0 0 20px 20px;
            z-index: -1;
        }

        .device-frame img {
            width: 100%; height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* --- MOBILE FRAME (SMALL SCREENS) --- */
        @media (max-width: 767px) {
            .preview-wrapper { padding: 40px 15px; }

            .device-frame {
                max-width: 280px; 
                aspect-ratio: 9 / 19.5; 
                border: 12px solid #121212; 
                border-radius: 45px; 
                margin-bottom: 40px;
            }
            
            /* Laptop base hide karna */
            .device-frame::after {
                width: 35%; height: 4px;
                background: rgba(255,255,255,0.4);
                bottom: 12px; left: 50%;
                transform: translateX(-50%);
                border-radius: 10px;
                z-index: 10;
            }

            /* Mobile Notch */
            .device-frame::before {
                top: 0; width: 45%; height: 22px;
                background: #121212;
                border-radius: 0 0 18px 18px;
                z-index: 11;
            }

            .device-frame img {
                object-fit: cover;
                border-radius: 33px;
            }
        }

        /* --- BUTTONS --- */
        .button-group { display: flex; flex-direction: column; align-items: center; gap: 15px; }

        .btn-download { 
            background: var(--theme-maroon); color: white; border: none; 
            padding: 16px 40px; border-radius: 50px; cursor: pointer; 
            font-size: 16px; font-weight: 600; width: 100%; max-width: 300px;
            box-shadow: 0 10px 20px rgba(139,0,0,0.3); transition: 0.3s;
        }
        
        .btn-download:hover { background: var(--theme-maroon-dark); transform: translateY(-3px); }

        .btn-share { 
            background: transparent; color: white; border: 2px solid rgba(255,255,255,0.3); 
            padding: 14px 40px; border-radius: 50px; cursor: pointer; 
            font-size: 15px; font-weight: 500; width: 100%; max-width: 300px;
            transition: 0.3s;
        }
        
        .btn-share:hover { background: rgba(255,255,255,0.1); border-color: white; }
    </style>
</head>
<body>

    <div class="page-header">
        <button class="btn-back" onclick="goBack()">
            <i class="fas fa-arrow-left"></i> Back
        </button>
        <h2 id="dynamic-preview-title">Loading...</h2>
    </div>
    
    <div class="container">
        <div class="preview-wrapper">
            <div class="device-frame">
                <img id="dynamic-preview-img" src="" alt="Preview Image" style="display: none;">
            </div>
            
            <div class="button-group">
                <button id="dynamic-download-btn" class="btn-download">
                    <i class="fas fa-download"></i> Download Image
                </button>
                <button id="dynamic-share-btn" class="btn-share" style="display: none;">
                    <i class="fas fa-share-alt"></i> Share Image
                </button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const imageUrl = urlParams.get('url');
        const imageTitle = urlParams.get('title') || 'Wallpaper';

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('dynamic-preview-title').innerText = imageTitle;
            if(imageUrl) {
                const imgElement = document.getElementById('dynamic-preview-img');
                imgElement.src = imageUrl;
                imgElement.style.display = 'block'; 
                document.getElementById('dynamic-download-btn').onclick = function() { downloadImage(imageUrl, imageTitle); };
            } else {
                document.getElementById('dynamic-preview-title').innerText = "Image Not Found";
                document.getElementById('dynamic-download-btn').style.display = "none";
            }
        });

        function goBack() { window.history.length > 1 ? window.history.back() : window.location.href = 'index.html'; }

        async function downloadImage(url, title) {
            try {
                const btn = document.getElementById('dynamic-download-btn');
                const shareBtn = document.getElementById('dynamic-share-btn');
                const originalText = btn.innerHTML;
                btn.innerHTML = "⏳ Downloading...";
                const response = await fetch(url);
                const blob = await response.blob();
                const objectUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = objectUrl;
                a.download = `${title}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(objectUrl);
                btn.innerHTML = "✅ Downloaded!";
                shareBtn.style.display = 'inline-flex';
                shareBtn.onclick = function() { shareImageLink(url, title); };
                setTimeout(() => btn.innerHTML = originalText, 3000); 
            } catch (error) { window.open(url, '_blank'); }
        }

        async function shareImageLink(url, title) {
            if (navigator.share) {
                try {
                    const response = await fetch(url);
                    const blob = await response.blob();
                    const file = new File([blob], `${title}.png`, { type: blob.type });
                    await navigator.share({ title: title, files: [file] });
                } catch (e) { console.log(e); }
            }
        }
    </script>
</body>
</html>
