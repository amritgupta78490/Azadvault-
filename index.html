<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azadvault - Biodata Maker Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAhjIHv-buPd9HK3Uf52VLxwwJFIZe1H5Y",
            authDomain: "amritone-4bdcd.firebaseapp.com",
            projectId: "amritone-4bdcd",
            storageBucket: "amritone-4bdcd.firebasestorage.app",
            messagingSenderId: "500948842891",
            appId: "1:500948842891:web:36eb457b02445fa3d4978e",
            measurementId: "G-ZSJ73XSSNQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        window.allDesignsData = [];

        // Load Main Designs (Optimized for performance)
        async function loadDesigns() {
            const mainGrid = document.getElementById('main-grid');
            if (!mainGrid) return;

            try {
                const q = query(collection(db, "designs"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                let gridHTML = ""; 

                querySnapshot.forEach((doc, index) => {
                    const data = doc.data();
                    window.allDesignsData.push(data); 

                    const animationDelay = (index % 10) * 0.05; 
                    const safeTitle = data.title ? String(data.title).replace(/'/g, "\\'") : 'Design';
                    const keywords = Array.isArray(data.keywords) ? data.keywords.join(" ") : String(data.keywords || "");
                    const category = String(data.category || "other").toLowerCase();
                    const imageUrl = data.imageUrl || "";
                    const creatorName = data.creatorName ? String(data.creatorName).toLowerCase() : "";

                    if (!imageUrl) return; 

                    gridHTML += `
                        <div class="item-card search-item" data-category="${category}" data-keywords="${keywords}" data-creator="${creatorName}" style="animation-delay: ${animationDelay}s" onclick="openImagePreview('${imageUrl}', '${safeTitle}')">
                            <img src="${imageUrl}" alt="${safeTitle}" loading="lazy">
                            <div class="card-overlay">
                                <h3>${safeTitle}</h3>
                            </div>
                        </div>
                    `;
                });
                
                mainGrid.innerHTML = gridHTML; 
            } catch (error) {
                console.error("Error fetching designs: ", error);
            }
        }

        async function loadCreators() {
            const creatorGrid = document.getElementById('creator-grid');
            if (!creatorGrid) return;

            try {
                const q = query(collection(db, "creators")); 
                const querySnapshot = await getDocs(q);
                let creatorHTML = "";

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const name = data.name || "Creator";
                    const safeName = name.replace(/'/g, "\\'");
                    const dpImage = data.dpImage || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random`;
                    const instaLink = data.instagramLink || "#";

                    creatorHTML += `
                        <div class="creator-item" onclick="openCreatorProfile('${safeName}', '${dpImage}', '${instaLink}')">
                            <div class="story-ring">
                                <img src="${dpImage}" alt="${name}" loading="lazy" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random'">
                            </div>
                            <span class="creator-name">${name}</span>
                        </div>
                    `;
                });
                
                if(creatorHTML !== "") {
                    creatorGrid.innerHTML = creatorHTML; 
                }
            } catch (error) {
                console.error("Error fetching creators: ", error);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadDesigns();
            loadCreators();
        });
    </script>

    <style>
        :root {
            --bg-color: #F4F6F9;
            --primary-color: #1A73E8; 
            --text-dark: #1A1A24;
            --text-muted: #64748B;
            --theme-maroon: #8B0000;
            --theme-maroon-dark: #4A0000;
            --curve-large: 24px;
            --curve-medium: 16px;
            --curve-small: 10px;
            --shadow-soft: 0 4px 20px rgba(0,0,0,0.06);
            --shadow-hover: 0 12px 30px rgba(0,0,0,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-dark); overflow-x: hidden; scroll-behavior: smooth; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        header {
            position: sticky; top: 0; z-index: 100; padding: 25px 5% 35px;
            background: linear-gradient(135deg, var(--theme-maroon) 0%, var(--theme-maroon-dark) 100%);
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
            box-shadow: 0 10px 30px rgba(139, 0, 0, 0.25);
        }

        .text-logo {
            font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 800; 
            text-align: center; color: #fff; letter-spacing: -1px;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.3));
        }
        
        .header-search {
            display: flex; align-items: center; background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: 50px; padding: 14px 24px; width: 100%; max-width: 580px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15); transition: all 0.3s ease;
        }

        .header-search:focus-within { transform: translateY(-3px); background: #ffffff; }
        .header-search input { border: none; outline: none; width: 100%; background: transparent; margin-left: 12px; font-size: 15px; color: #333; }

        .creator-section { padding: 25px 5% 10px 5%; }
        .creator-scroll { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .creator-scroll::-webkit-scrollbar { display: none; }
        .creator-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; min-width: 80px; }
        .story-ring {
            width: 76px; height: 76px; border-radius: 50%;
            background: linear-gradient(45deg, #f09433 0%, #dc2743 50%, #bc1888 100%);
            padding: 3px; display: flex; justify-content: center; align-items: center; margin-bottom: 8px;
        }
        .story-ring img { width: 100%; height: 100%; border-radius: 50%; border: 2.5px solid var(--bg-color); object-fit: cover; }

        .creator-profile-banner {
            display:none; background: white; margin: 15px auto; width: 90%; max-width: 450px;
            padding: 20px; border-radius: var(--curve-large); align-items: center; gap: 18px; position: relative;
        }
        .creator-profile-banner img { width: 75px; height: 75px; border-radius: 50%; object-fit: cover; }
        .btn-follow { background: linear-gradient(135deg, #f09433, #dc2743, #bc1888); color: #fff; border: none; padding: 10px 20px; border-radius: 50px; font-weight: 600; cursor: pointer; }

        .category-nav { display: flex; justify-content: center; gap: 12px; padding: 10px 5% 25px; overflow-x: auto; scrollbar-width: none; }
        .cat-pill { padding: 10px 22px; background: white; border-radius: 50px; color: var(--text-muted); font-weight: 500; cursor: pointer; transition: 0.3s; }
        .cat-pill.active { background: var(--theme-maroon); color: white; }

        .container { padding: 0 5%; max-width: 1600px; margin: auto; }
        .masonry-grid { column-count: 1; column-gap: 20px; padding: 10px 0 30px; }
        @media (min-width: 600px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 900px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1200px) { .masonry-grid { column-count: 4; } }

        .item-card { background: white; border-radius: var(--curve-medium); overflow: hidden; margin-bottom: 20px; break-inside: avoid; position: relative; cursor: pointer; animation: fadeUp 0.6s ease forwards; box-shadow: var(--shadow-soft); transition: 0.3s; }
        .item-card:hover { transform: translateY(-8px); }
        .item-card img { width: 100%; display: block; }
        .card-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 30px 15px 15px; background: linear-gradient(to top, rgba(0,0,0,0.85), transparent); color: white; opacity: 0; transition: 0.3s; }
        .item-card:hover .card-overlay { opacity: 1; }

        footer { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }

        @media (max-width: 768px) {
            .text-logo { font-size: 40px; }
            .masonry-grid { column-count: 2; column-gap: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <h1 class="text-logo">Azad Vault</h1>
        <div class="header-search">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8B0000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="global-search" placeholder="Search designs...">
        </div>
    </header>

    <div class="creator-section">
        <div class="creator-scroll" id="creator-grid"></div>
    </div>

    <div id="creator-profile-banner" class="creator-profile-banner">
        <button onclick="closeCreatorProfile()" style="position:absolute; right:15px; top:15px; border:none; background:none; cursor:pointer;">×</button>
        <img id="cp-img" src="" alt="Creator">
        <div class="cp-info">
            <h2 id="cp-name">Creator Name</h2>
            <button id="cp-follow-btn" class="btn-follow">Follow on Instagram</button>
        </div>
    </div>

    <div class="category-nav" id="category-nav">
        <button class="cat-pill active" onclick="filterGrid('all', this)">All Designs</button>
        <button class="cat-pill" onclick="filterGrid('wallpaper', this)">Wallpaper</button>
        <button class="cat-pill" onclick="openBiodataPage()">Biodata</button>
    </div>

    <div class="container">
        <div class="no-results" id="no-results-msg" style="display:none; text-align:center; padding:50px;">No designs found.</div>
        <div class="masonry-grid" id="main-grid"></div>
    </div>

    <footer>
        <p>&copy; 2026 Azad Vault</p>
    </footer>

    <script>
        // --- NEW PAGE NAVIGATION LOGIC --- //
        function openImagePreview(imageUrl, title) {
            // Popup खोलने के बजाय अब यह 'wallpaper.html' पर redirect करेगा
            // URL में इमेज का लिंक और टाइटल भेज रहे हैं
            const encodedUrl = encodeURIComponent(imageUrl);
            const encodedTitle = encodeURIComponent(title);
            window.location.href = `wallpaper.html?url=${encodedUrl}&title=${encodedTitle}`;
        }

        let currentCreator = null;

        function openCreatorProfile(name, dpUrl, instaLink) {
            currentCreator = name.toLowerCase(); 
            document.getElementById('cp-name').innerText = name + "'s Uploads";
            document.getElementById('cp-img').src = dpUrl;
            document.getElementById('cp-follow-btn').onclick = () => window.open(instaLink, '_blank');
            document.getElementById('creator-profile-banner').style.display = 'flex';
            document.getElementById('category-nav').style.display = 'none';
            filterByCreator();
        }

        function closeCreatorProfile() {
            document.getElementById('creator-profile-banner').style.display = 'none';
            document.getElementById('category-nav').style.display = 'flex';
            currentCreator = null;
            filterGrid('all', document.querySelector('.cat-pill'));
        }

        function filterByCreator() {
            let items = document.querySelectorAll('.search-item');
            items.forEach(item => {
                item.style.display = (item.getAttribute('data-creator') === currentCreator) ? 'block' : 'none';
            });
        }

        function filterGrid(keyword, btnElement) {
            document.querySelectorAll('.cat-pill').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            let items = document.querySelectorAll('.search-item');
            items.forEach(item => {
                let category = item.getAttribute('data-category');
                item.style.display = (keyword === 'all' || category.includes(keyword)) ? 'block' : 'none';
            });
        }

        document.getElementById('global-search').addEventListener('input', function(e) {
            let query = e.target.value.toLowerCase();
            let items = document.querySelectorAll('.search-item');
            items.forEach(item => {
                let title = item.querySelector('h3').innerText.toLowerCase();
                item.style.display = title.includes(query) ? 'block' : 'none';
            });
        });

        function openBiodataPage() { window.location.href = "biodata.html"; }
    </script>
</body>
</html>
