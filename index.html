        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";

        import { getStorage } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAhjIHv-buPd9HK3Uf52VLxwwJFIZe1H5Y",
            authDomain: "amritone-4bdcd.firebaseapp.com",

            messagingSenderId: "500948842891",
            appId: "1:500948842891:web:36eb457b02445fa3d4978e",
            measurementId: "G-ZSJ73XSSNQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.allDesignsData = [];

        async function loadDesigns() {
            const mainGrid = document.getElementById('main-grid');
            if (!mainGrid) return;

            try {
                const q = query(collection(db, "designs"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                let gridHTML = ""; 

                querySnapshot.forEach((doc, index) => {
                    const data = doc.data();
                    window.allDesignsData.push(data); 

                    const animationDelay = (index % 10) * 0.05; 
                    const safeTitle = data.title ? String(data.title).replace(/'/g, "\\'") : 'Design';
                    const keywords = Array.isArray(data.keywords) ? data.keywords.join(" ").toLowerCase() : String(data.keywords || "").toLowerCase();
                    const category = String(data.category || "other").toLowerCase();
                    const creator = String(data.creator || "").toLowerCase();
                    const imageUrl = data.imageUrl || "";
                    
                    // Changed to sort by actual downloads. Fallback to 0 if no downloads data exists.
                    const downloads = data.downloads || 0;

                    if (!imageUrl) return; 

                    gridHTML += `
                        <div class="item-card search-item" data-index="${index}" data-downloads="${downloads}" data-category="${category}" data-keywords="${keywords}" data-creator="${creator}" style="animation-delay: ${animationDelay}s" onclick="openImagePreview('${imageUrl}', '${safeTitle}')">
                        <img src="${imageUrl}" alt="${safeTitle} HD wallpaper download free" title="${safeTitle} wallpaper" loading="lazy">
                            <div class="card-overlay">
                                <h3>${safeTitle}</h3>
                            </div>
                        </div>
                    `;
                });
                
                mainGrid.innerHTML = gridHTML; 
            } catch (error) {
                console.error("Error fetching designs: ", error);
            }
        }

        async function loadCreators() {
            const creatorGrid = document.getElementById('creator-grid');
            if (!creatorGrid) return;

            try {
                const q = query(collection(db, "creators")); 
                const querySnapshot = await getDocs(q);
                let creatorHTML = "";

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const name = data.name || "Creator";
                    const safeName = name.replace(/'/g, "\\'");
                    const dpImage = data.dpImage || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random`;
                    const instaLink = data.instagramLink || "#";

                    creatorHTML += `
                        <div class="creator-item" onclick="openCreatorProfile('${safeName}', '${dpImage}', '${instaLink}')">
                            <div class="story-ring">
                                <img src="${dpImage}" alt="${name}" loading="lazy" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random'">
                            </div>
                            <span class="creator-name">${name}</span>
                        </div>
                    `;
                });
                
                if(creatorHTML !== "") {
                    creatorGrid.innerHTML = creatorHTML; 
                }
            } catch (error) {
                console.error("Error fetching creators: ", error);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadDesigns();
            loadCreators();
        });
    </script>

    <script>
        function openImagePreview(imageUrl, title) {
            const encodedUrl = encodeURIComponent(imageUrl);
            const encodedTitle = encodeURIComponent(title);
            window.location.href = `wallpaper.html?url=${encodedUrl}&title=${encodedTitle}`;
        }

        function openCreatorProfile(name, dpUrl, instaLink) {
            const encodedName = encodeURIComponent(name);
            const encodedDp = encodeURIComponent(dpUrl);
            const encodedInsta = encodeURIComponent(instaLink);
            window.location.href = `creator.html?name=${encodedName}&dp=${encodedDp}&insta=${encodedInsta}`;
        }

        function filterGrid(keyword, btnElement) {
            document.querySelectorAll('.cat-pill').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            let items = document.querySelectorAll('.search-item');
            let hasResults = false;

            items.forEach(item => {
                let category = item.getAttribute('data-category');
                if (keyword === 'all' || category.includes(keyword)) {
                    item.style.display = 'block';
                    hasResults = true;
                } else {
                    item.style.display = 'none';
                }
            });
            document.getElementById('no-results-msg').style.display = hasResults ? 'none' : 'block';
        }

        // ================= SORT SYSTEM (LATEST/TRENDING) =================
        window.sortGrid = function(type, btnElement) {
            // Manage active class
            document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            let grid = document.getElementById('main-grid');
            let items = Array.from(grid.getElementsByClassName('search-item'));

            if (type === 'trending') {
                // Sort by downloads
                items.sort((a, b) => parseInt(b.getAttribute('data-downloads')) - parseInt(a.getAttribute('data-downloads')));
            } else {
                // Restore to latest (original load index)
                items.sort((a, b) => parseInt(a.getAttribute('data-index')) - parseInt(b.getAttribute('data-index')));
            }

            // Re-append items in new sorted order
            items.forEach(item => grid.appendChild(item));
        };
        // ================= END SORT SYSTEM =================

        // ================= IMPROVED ADVANCED SEARCH SYSTEM =================
        const searchInput = document.getElementById('global-search');
        const suggestionsBox = document.getElementById('search-suggestions');

        searchInput.addEventListener('input', function(e) {
            let query = e.target.value.toLowerCase().trim();
            let items = document.querySelectorAll('.search-item');
            let hasResults = false;
            
            // 1. Filter Grid items dynamically
            items.forEach(item => {
                let title = item.querySelector('h3').innerText.toLowerCase();
                let category = item.getAttribute('data-category') || "";
                let keywords = item.getAttribute('data-keywords') || "";
                let creator = item.getAttribute('data-creator') || "";
                
                // Matches title, keywords, or creator
                if(title.includes(query) || keywords.includes(query) || creator.includes(query) || category.includes(query)) {
                    item.style.display = 'block';
                    hasResults = true;
                } else {
                    item.style.display = 'none';
                }
            });

            document.getElementById('no-results-msg').style.display = hasResults || query === "" ? 'none' : 'block';

            // 2. Build Autocomplete Suggestions
            if (query.length > 0 && window.allDesignsData) {
                let matchedSuggestions = [];

                window.allDesignsData.forEach(data => {
                    let sTitle = (data.title || "").toLowerCase();
                    let sCreator = (data.creator || "").toLowerCase();
                    let sKeywords = Array.isArray(data.keywords) ? data.keywords.join(" ").toLowerCase() : String(data.keywords || "").toLowerCase();
                    
                    if (sTitle.includes(query)) {
                        matchedSuggestions.push({ text: data.title, type: 'Title' });
                    } else if (sCreator.includes(query)) {
                        matchedSuggestions.push({ text: data.creator, type: 'Creator' });
                    } else if (sKeywords.includes(query)) {
                        let kwArray = sKeywords.split(" ");
                        let matchKw = kwArray.find(k => k.includes(query));
                        if(matchKw) matchedSuggestions.push({ text: matchKw, type: 'Keyword' });
                    }
                });

                // Remove duplicate suggestions and limit to top 6
                let uniqueSuggestions = Array.from(new Set(matchedSuggestions.map(s => s.text)))
                    .map(text => matchedSuggestions.find(s => s.text === text)).slice(0, 6);

                if (uniqueSuggestions.length > 0) {
                    suggestionsBox.innerHTML = uniqueSuggestions.map(s => `
                        <div class="suggestion-item" onclick="applySearch('${s.text.replace(/'/g, "\\'")}')">
                            <span class="suggestion-text">${s.text}</span>
                            <span class="suggestion-type">${s.type}</span>
                        </div>
                    `).join('');
                    suggestionsBox.style.display = 'block';
                } else {
                    suggestionsBox.style.display = 'none';
                }
            } else {
                suggestionsBox.style.display = 'none';
            }
        });

        // Click outside to close suggestions
        document.addEventListener('click', function(e) {
            if (!searchInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
                suggestionsBox.style.display = 'none';
            }
        });

        // Function triggered when suggestion is clicked
        window.applySearch = function(text) {
            searchInput.value = text;
            suggestionsBox.style.display = 'none';
            searchInput.dispatchEvent(new Event('input')); // Re-trigger the search event
        };
        // ================= END OF ADVANCED SEARCH SYSTEM =================

        function openBiodataPage() { window.location.href = "biodata.html"; }

        // FIXED LANDING PAGE HIDE LOGIC
        setTimeout(() => {
            const landing = document.getElementById("landing-screen");
            if(landing) {
                landing.style.opacity = "0";

                setTimeout(() => {
                    landing.style.display = "none";
                }, 1000);
            }
        }, 4000); // 4 sec fade logic

    </script>
