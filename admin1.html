<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Panel - Upload</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, getDocs, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAhjIHv-buPd9HK3Uf52VLxwwJFIZe1H5Y",
            authDomain: "amritone-4bdcd.firebaseapp.com",
            projectId: "amritone-4bdcd",
            storageBucket: "amritone-4bdcd.firebasestorage.app",
            messagingSenderId: "500948842891",
            appId: "1:500948842891:web:36eb457b02445fa3d4978e",
            measurementId: "G-ZSJ73XSSNQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ==========================================
        // 🔴 YAHAN CREATOR KA NAAM LIKHEIN 🔴
        // ==========================================
        const CREATOR_NAME = "bk_barad"; // Har creator ke liye yahan naam change karein
        
        // UI Update with Creator Name
        document.getElementById('panel-title').innerText = `🎨 ${CREATOR_NAME}'s Panel`;

        // UI Elements
        const statusMsg = document.getElementById('status-message');
        const submitBtn = document.getElementById('submit-btn');
        const loadHistoryBtn = document.getElementById('load-history-btn');
        const historyList = document.getElementById('history-list');

        // Helper: Show Status Messages
        function showStatus(message, color, element = statusMsg) {
            element.style.color = color;
            element.innerText = message;
            setTimeout(() => { element.innerText = ""; }, 5000);
        }

        // ==========================================
        // 1. UPLOAD WALLPAPER (Only for this Creator)
        // ==========================================
        document.getElementById('upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('title').value;
            const file = document.getElementById('image-file').files[0];
            const keywordsInput = document.getElementById('keywords').value;

            const keywordsArray = keywordsInput
                .toLowerCase()
                .split(',')
                .map(k => k.trim())
                .filter(k => k !== "");

            if (!file) {
                alert("Please select an image");
                return;
            }

            submitBtn.innerText = "Uploading Wallpaper...";
            submitBtn.disabled = true;

            try {
                // ImgBB Upload
                const formData = new FormData();
                formData.append("image", file);

                const response = await fetch("https://api.imgbb.com/1/upload?key=50b5c2a8bb3059b6777b89d358e22b6c", {
                    method: "POST",
                    body: formData
                });

                const result = await response.json();

                if (!result.success) {
                    throw new Error("Image upload failed");
                }

                const imageUrl = result.data.url;

                // Save to Firebase directly
                await addDoc(collection(db, "designs"), {
                    title: title,
                    imageUrl: imageUrl,
                    category: "wallpaper", // Category fixed to wallpaper
                    keywords: keywordsArray,
                    creatorName: CREATOR_NAME, // Automatically uses hardcoded name
                    downloads: 0,
                    isOfficial: false,
                    createdAt: serverTimestamp()
                });

                showStatus("✔ Wallpaper Uploaded Successfully!", "green");
                document.getElementById('upload-form').reset();

            } catch (error) {
                console.error(error);
                showStatus("❌ Upload Failed", "red");
            }

            submitBtn.innerText = "Upload Wallpaper";
            submitBtn.disabled = false;
        });

        // ==========================================
        // 2. MANAGE / DELETE HISTORY (Filtered by Creator)
        // ==========================================
        async function loadCreatorHistory() {
            historyList.innerHTML = "<p style='text-align:center; font-size:13px; color:#666; margin-top: 10px;'>Loading...</p>";

            try {
                // Query: Sirf wahi designs lao jahan creatorName match kare
                const q = query(collection(db, "designs"), where("creatorName", "==", CREATOR_NAME));
                const querySnapshot = await getDocs(q);

                historyList.innerHTML = "";

                if (querySnapshot.empty) {
                    historyList.innerHTML = `<p style='text-align:center; font-size:13px; color:#666; margin-top: 10px;'>No wallpapers found for ${CREATOR_NAME}.</p>`;
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const docId = docSnap.id;
                    const displayTitle = data.title || "No Title";
                    const displayImg = data.imageUrl || "https://via.placeholder.com/40?text=None";

                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'history-item';
                    itemDiv.innerHTML = `
                        <div class="history-info">
                            <img src="${displayImg}" alt="img" class="history-img" onerror="this.src='https://via.placeholder.com/40?text=Error'">
                            <span class="history-title" title="${displayTitle}">${displayTitle}</span>
                        </div>
                        <button class="btn-delete" data-id="${docId}">Delete</button>
                    `;
                    historyList.appendChild(itemDiv);
                });

                // Attach Delete Events
                document.querySelectorAll('.btn-delete').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const targetDocId = e.target.getAttribute('data-id');
                        
                        if (confirm(`Are you sure you want to delete this wallpaper?`)) {
                            e.target.innerText = "Deleting...";
                            e.target.disabled = true;
                            
                            try {
                                await deleteDoc(doc(db, "designs", targetDocId));
                                e.target.closest('.history-item').remove();
                                
                                if (historyList.children.length === 0) {
                                    historyList.innerHTML = `<p style='text-align:center; font-size:13px; color:#666; margin-top: 10px;'>No wallpapers found.</p>`;
                                }
                            } catch (err) {
                                console.error("Error deleting document: ", err);
                                alert("Failed to delete.");
                                e.target.innerText = "Delete";
                                e.target.disabled = false;
                            }
                        }
                    });
                });

            } catch (error) {
                console.error("Error fetching history: ", error);
                historyList.innerHTML = "<p style='text-align:center; color:red; font-size:13px;'>Error loading history.</p>";
            }
        }

        loadHistoryBtn.addEventListener('click', loadCreatorHistory);

    </script>

    <style>
        :root {
            --bg-color: #E8EBE4;
            --primary-color: #4A5D23;
            --secondary-color: #2D3A14;
            --text-dark: #1A1A1A;
            --curve-large: 24px;
            --curve-medium: 12px;
            --curve-small: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        .admin-container {
            background: white;
            padding: 30px;
            border-radius: var(--curve-large);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            margin: 20px;
        }

        .admin-header {
            text-align: center;
            margin-bottom: 25px;
            color: var(--secondary-color);
        }

        .admin-header h1 {
            font-size: 22px;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--primary-color); font-size: 14px; }
        .form-group input {
            width: 100%; padding: 14px; border: 2px solid #ccc; border-radius: var(--curve-small);
            outline: none; font-size: 14px; transition: border-color 0.3s;
        }
        .form-group input:focus { border-color: var(--primary-color); }

        .btn {
            width: 100%; color: white; border: none; padding: 15px; border-radius: var(--curve-medium);
            font-size: 16px; font-weight: bold; cursor: pointer; transition: opacity 0.3s, transform 0.1s; margin-bottom: 12px;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }

        .btn-upload { background: var(--primary-color); }
        .btn-upload:hover { background: var(--secondary-color); }

        .btn-history { background: #64748b; padding: 12px; font-size: 14px; width: 100%;}
        .btn-history:hover { background: #475569; }

        .status-msg { text-align: center; margin-top: 5px; font-weight: bold; font-size: 14px; min-height: 20px; }

        hr { border: 0; height: 1px; background: #e2e8f0; margin: 25px 0; }
        .manage-section { text-align: center; }

        /* History Management Styles */
        .history-container { margin-top: 15px; max-height: 250px; overflow-y: auto; text-align: left;}
        .history-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #f8fafc; padding: 10px; margin-bottom: 8px; 
            border-radius: var(--curve-small); border: 1px solid #e2e8f0;
        }
        .history-info { display: flex; align-items: center; gap: 10px; overflow: hidden; }
        .history-img { width: 45px; height: 45px; object-fit: cover; border-radius: 4px; background: #e2e8f0; }
        .history-title { font-size: 14px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-delete:hover { background: #dc2626; }
        .btn-delete:disabled { opacity: 0.5; }

        .history-container::-webkit-scrollbar { width: 6px; }
        .history-container::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px;}
        .history-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px;}
        .history-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="admin-header">
            <h1 id="panel-title">🎨 Creator Panel</h1>
            <p style="font-size: 13px; color: #666; margin-top: 5px;">Upload & Manage Wallpapers</p>
        </div>

        <form id="upload-form">
            <div class="form-group">
                <label for="title">Wallpaper Title</label>
                <input type="text" id="title" placeholder="e.g., Cool Army Background" required>
            </div>

            <div class="form-group">
                <label for="image-file">Upload Image</label>
                <input type="file" id="image-file" accept="image/*" required>
            </div>
            
            <div class="form-group">
                <label for="keywords">Keywords</label>
                <input type="text" id="keywords" placeholder="e.g., hanuman, god, bajrangbali">
            </div>
            
            <button type="submit" class="btn btn-upload" id="submit-btn">Upload Wallpaper</button>
            <div class="status-msg" id="status-message"></div>
        </form>

        <hr>

        <div class="manage-section">
            <h3 style="color: var(--primary-color); margin-bottom: 15px; font-size: 16px;">🗑️ My Uploads</h3>
            
            <button type="button" class="btn btn-history" id="load-history-btn">Load My Wallpapers</button>
            
            <div id="history-list" class="history-container">
                </div>
        </div>

    </div>

</body>
</html>
